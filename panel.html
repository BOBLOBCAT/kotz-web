<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Alto Mando · KoTZ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/crest.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <img class="crest-img" src="assets/crest.png" alt="Escudo KoTZ">
    <h1>Acceso Alto Mando</h1>
    <p class="lede">Verificando tu sesión de Discord y tus roles dentro del servidor de KoTZ.</p>
    <div class="login-hint" id="loginHint">
      Si no has iniciado sesión, serás enviado automáticamente al login de Discord.
    </div>
    <a href="/auth/discord?next=/panel.html" class="btn btn-primary" style="width:100%; margin-top:22px;">Iniciar sesión con Discord</a>
    <a href="index.html" class="btn btn-ghost btn-sm" style="margin-top:22px;">← Volver al sitio público</a>
  </div>
</div>

<div id="panelApp"></div>

<script src="js/data.js"></script>
<script src="js/panel.js"></script>
